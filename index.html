<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Cara Mia</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
height:100%;
width:100%;
overflow:hidden;
background:#000;
color:#fff;
font-family:Georgia,serif;
display:flex;
justify-content:center;
align-items:center;
text-align:center;

user-select:none;
-webkit-user-select:none;
-webkit-touch-callout:none;
}

/* fondo */

body::before{
content:"";
position:fixed;
inset:0;
background:radial-gradient(circle,#111,#000);
z-index:-1;
}

/* luna */

.moon{
position:fixed;
top:30px;
right:30px;
font-size:40px;
opacity:.8;
}

/* contenedor */

.container{
width:90%;
max-width:420px;
padding:30px;
border:2px solid white;
border-radius:12px;
box-shadow:0 0 25px rgba(255,255,255,.15);
}

/* titulo */

h1{
font-size:26px;
margin-bottom:10px;
}

.subtitle{
font-size:14px;
opacity:.7;
margin-bottom:20px;
}

/* frase */

#frase{
font-size:20px;
min-height:80px;
line-height:1.4;
}

/* cursor */

.cursor{
display:inline-block;
width:2px;
background:white;
margin-left:4px;
animation:blink 1s infinite;
}

@keyframes blink{
0%,50%,100%{opacity:1}
25%,75%{opacity:0}
}

/* final */

.final{
margin-top:25px;
font-size:22px;
}

/* rosas */

.rose{
position:absolute;
font-size:22px;
opacity:.35;
animation:fall 4s linear;
}

@keyframes fall{
to{transform:translateY(120vh)}
}

/* murciélagos */

.bat{
position:absolute;
font-size:18px;
animation:fly 8s linear;
}

@keyframes fly{
from{transform:translateX(-10vw)}
to{transform:translateX(110vw)}
}

</style>
</head>

<body>

<div class="moon">🌙</div>

<div class="container">

<h1>Feliz Día de la Mujer</h1>

<div class="subtitle">
Para mi eternamente fascinante
</div>

<div id="frase"></div>
<span class="cursor"></span>

<div class="final">
Cara Mia 🖤
</div>

</div>

<script>

/* frases */

const frases=[

'"Cara Mia..."',

'"Mi querida Morticia, mi amor por ti es eterno."',

'"Tu belleza es como la noche... misteriosa y eterna."',

'"Cada momento contigo es un paraíso oscuro y hermoso."',

'"Morticia, eres la única mujer que podría hacer que mi corazón lata así."'

]

let fraseIndex=0
let letraIndex=0

function escribir(){

let frase=frases[fraseIndex]

if(letraIndex < frase.length){

document.getElementById("frase").textContent += frase.charAt(letraIndex)

letraIndex++

setTimeout(escribir,35)

}else{

setTimeout(cambiarFrase,3500)

}

}

function cambiarFrase(){

fraseIndex++

if(fraseIndex>=frases.length)fraseIndex=0

document.getElementById("frase").textContent=""

letraIndex=0

setTimeout(escribir,400)

}

escribir()

/* rosas */

document.addEventListener("pointerdown",(e)=>{

let rose=document.createElement("div")

rose.className="rose"
rose.innerHTML="🌹"

rose.style.left=e.clientX+"px"
rose.style.top=e.clientY+"px"

document.body.appendChild(rose)

setTimeout(()=>{rose.remove()},4000)

})

/* murciélagos */

function bat(){

let b=document.createElement("div")

b.className="bat"
b.innerHTML="🦇"

b.style.top=Math.random()*200+"px"

document.body.appendChild(b)

setTimeout(()=>{b.remove()},8000)

}

setInterval(bat,4000)

</script>

</body>
</html>
