<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Cara Mia</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
position:fixed;
height:100%;
width:100%;
overflow:hidden;
background:#000;
color:#fff;
font-family:Georgia,serif;
display:flex;
justify-content:center;
align-items:center;
text-align:center;

touch-action:none;
overscroll-behavior:none;

-webkit-user-select:none;
user-select:none;
}

/* fondo oscuro */

body::before{
content:"";
position:fixed;
inset:0;
background:radial-gradient(circle at center,#111,#000);
z-index:-3;
}

/* luna */

.moon{
position:fixed;
top:40px;
right:40px;
font-size:90px;
opacity:.85;
}

/* mansión */

.mansion{
position:fixed;
bottom:0;
left:50%;
transform:translateX(-50%);
font-size:120px;
opacity:.25;
}

/* contenedor */

.container{
width:90%;
max-width:420px;
padding:28px;
border:2px solid white;
border-radius:14px;
box-shadow:0 0 30px rgba(255,255,255,.15);
}

/* titulo */

h1{
font-size:26px;
margin-bottom:10px;
}

.subtitle{
font-size:14px;
opacity:.7;
margin-bottom:20px;
}

/* frase */

#frase{
font-size:20px;
min-height:90px;
line-height:1.4;
}

/* cursor */

.cursor{
display:inline-block;
width:2px;
height:22px;
background:white;
margin-left:4px;
animation:blink 1s infinite;
}

@keyframes blink{
0%,50%,100%{opacity:1}
25%,75%{opacity:0}
}

/* final */

.final{
margin-top:24px;
font-size:24px;
letter-spacing:2px;
}

/* rosas */

.rose{
position:absolute;
font-size:22px;
opacity:.5;
pointer-events:none;
animation:fall linear;
}

@keyframes fall{
to{transform:translateY(120vh)}
}

/* murciélagos */

.bat{
position:absolute;
font-size:20px;
opacity:.8;
pointer-events:none;
animation:fly linear;
}

@keyframes fly{
from{transform:translateX(-10vw)}
to{transform:translateX(110vw)}
}

</style>
</head>

<body>

<div class="moon">🌙</div>
<div class="mansion">🏰</div>

<div class="container">

<h1>Feliz Día de la Mujer</h1>

<div class="subtitle">
Para la mujer que ilumina incluso la noche
</div>

<div id="frase"></div>
<span class="cursor"></span>

<div class="final">
Cara Mia 🖤
</div>

</div>

<script>

/* FRASES */

const frases=[

'"Cara Mia..."',

'"Mi querida Morticia, mi amor por ti es eterno."',

'"Tu belleza es como la noche... misteriosa y eterna."',

'"Cada momento contigo es un paraíso oscuro y hermoso."',

'"Morticia, eres la única mujer capaz de hechizar mi alma."',

'"La vida sin ti sería como un día sin oscuridad."'

]

let fraseIndex=0
let letraIndex=0

function escribir(){

let frase=frases[fraseIndex]

if(letraIndex < frase.length){

document.getElementById("frase").textContent+=frase.charAt(letraIndex)

letraIndex++

setTimeout(escribir,35)

}else{

setTimeout(cambiarFrase,3500)

}

}

function cambiarFrase(){

fraseIndex++

if(fraseIndex>=frases.length)fraseIndex=0

document.getElementById("frase").textContent=""

letraIndex=0

setTimeout(escribir,400)

}

escribir()

/* LLUVIA DE ROSAS */

function lluviaRosa(){

let rose=document.createElement("div")

rose.className="rose"
rose.innerHTML="🌹"

rose.style.left=Math.random()*100+"vw"
rose.style.top="-30px"
rose.style.animationDuration=(5+Math.random()*5)+"s"

document.body.appendChild(rose)

setTimeout(()=>{rose.remove()},9000)

}

setInterval(lluviaRosa,900)

/* MURCIÉLAGOS */

function murcielago(){

let bat=document.createElement("div")

bat.className="bat"
bat.innerHTML="🦇"

bat.style.top=Math.random()*200+"px"
bat.style.animationDuration=(6+Math.random()*4)+"s"

document.body.appendChild(bat)

setTimeout(()=>{bat.remove()},10000)

}

setInterval(murcielago,4000)

/* BLOQUEO TOTAL DE SCROLL */

function bloquear(e){
e.preventDefault()
}

document.addEventListener("touchmove",bloquear,{passive:false})
document.addEventListener("touchstart",bloquear,{passive:false})
document.addEventListener("wheel",bloquear,{passive:false})

</script>

</body>
</html>
